listen = "127.0.0.1:17180"
strategy = "round-robin"

[[upstream]]
id = "anthropic-direct"
protocol = "anthropic"
base_url = "https://api.anthropic.com"
auth_header = "x-api-key: ${ANTHROPIC_API_KEY}"
enabled = true

[[upstream]]
id = "openai-direct"
protocol = "openai"
base_url = "https://api.openai.com"
auth_header = "Authorization: Bearer ${OPENAI_API_KEY}"
enabled = true
