name: ci
on:
  push:
    branches: [main]
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.10'
      - run: go vet ./...
      - run: go test ./... -race -count=1
      - run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...
